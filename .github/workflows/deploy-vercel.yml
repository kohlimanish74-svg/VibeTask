name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploys the repo root to the linked Vercel project. Ensure you've created
          # the Vercel project and added the VERCEL_TOKEN secret in this repo.
          vercel --prod --token $VERCEL_TOKEN --confirm

# Secrets required:
# - VERCEL_TOKEN (your Vercel personal token)
# Optionally set VERCEL_ORG_ID and VERCEL_PROJECT_ID if needed.
